name: Bookshelf API CI/CD

on:
  push:
    branches: [master] # Trigger otomatis saat push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm test # Menjalankan Unit Test otomatis

  build:
    runs-on: ubuntu-latest
    needs: test # Sequential: Build tidak akan jalan jika Test gagal
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t bookshelf-api:latest . # Validitas Docker Build
